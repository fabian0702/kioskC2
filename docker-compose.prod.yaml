x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-internal-hub-token: &internal-hub-token INTERNAL_HUB_TOKEN=1e9f870b5bcd13bfbcd00cd9cc17c66f1e9d653a93aaa9b13b0577336b8c1d59

services:
  clients:
    build: ./clients
    depends_on:
      - ui
    restart: unless-stopped
    logging: *default-logging
    environment:
      - *internal-hub-token
    volumes:
      - static_plugins:/static/plugins/
    networks:
      - c2
    labels:
      - traefik.http.services.clients.loadbalancer.server.port=8000
      - traefik.http.routers.clients.rule=PathPrefix(`/clients`)
      - traefik.enable=true


  website-bundler:
    build: ./website-bundler
    restart: unless-stopped
    logging: *default-logging
    networks:
      - c2

  plugins:
    build: ./plugins
    depends_on:
      - ui
      - website-bundler
    restart: unless-stopped
    logging: *default-logging
    environment:
      - *internal-hub-token
    volumes:
      - ./plugins/c2/plugins/:/code/c2/plugins/   # Enable hot-reloading of plugins
      - static_plugins:/static/
    networks:
      - c2

  ui:
    build: ./ui/
    restart: unless-stopped
    logging: *default-logging
    environment:
      - *internal-hub-token
    networks:
      - c2
    labels:
      - traefik.http.services.api.loadbalancer.server.port=8000
      - traefik.http.routers.api.rule=PathPrefix(`/`)
      - traefik.enable=true

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - traefik
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      c2:
        aliases:
          - auth.localhost       # traefik resolves this to reach dex via nginx→traefik→dex
          - auth.kiosk.mnta.in

  traefik:
    image: traefik:3.6
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/traefik.yml:/traefik.yml
      - ./traefik/dynamic.yml:/dynamic.yml
    logging: *default-logging
    networks:
      - c2
    restart: unless-stopped

volumes:
  static_plugins:
  dex_data:

networks:
  c2:
