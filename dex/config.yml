# Dex config for local development.
# This gives you a working OIDC provider with a static user and no external IdP.

issuer: https://auth.localhost

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

oauth2:
  responseTypes:
    - code
  skipApprovalScreen: true

staticClients:
  - id: traefik
    secret: traefik-local-secret
    name: Traefik
    redirectURIs:
      - https://localhost/oidc/callback
      - https://kiosk.mnta.in/oidc/callback

enablePasswordDB: true

staticPasswords:
  - email: admin@local.dev
    # bcrypt of "password" — change this if you care
    hash: "$2a$12$HEetu0OxRAVf4gzp2eXCS.nchPlcmYil7OOqSXllQ0FBwwXpScsm."
    username: admin
    userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"

connectors: []
